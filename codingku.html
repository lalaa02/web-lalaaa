<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hai, Kenalan Yuk!</title>
    <style>
        /* Mengatur font dan background pink pastel global */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Kotak utama web */
        .container {
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
            text-align: center;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(5px);
        }

        /* Judul utama */
        h1 {
            color: #ff5c8a;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .highlight {
            color: #ff758f;
            font-weight: bold;
        }

        /* Foto atau Avatar profile */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #ffb3c1;
            object-fit: cover;
            margin: 15px 0;
        }

        /* Kotak Form Pesan */
        .form-section {
            margin-top: 30px;
            background: #fff0f3;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #ffb3c1;
        }

        h3 {
            color: #ff4d6d;
            margin-top: 0;
        }

        /* Style Input Teks */
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ffe5ec;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #ff758f;
            background-color: #fff;
        }

        /* Tombol Kirim */
        button {
            background-color: #ff758f;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 10px rgba(255, 117, 143, 0.3);
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background-color: #ff4d6d;
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Hai, Aku Lala! ✨</h1>
        
        <img src="https://i.pinimg.com/736x/8f/1a/0b/8f1a0b5f543e36465dc4857b2824bc3e.jpg" alt="Foto Lala" class="profile-img">
        
        <p>Welcome to my little space! 🌸</p>
        <p>Aku umur <span class="highlight">18 tahun</span>, suka banget sama warna <span class="highlight">pink</span>, dan kalau lagi bosan biasanya aku <span class="highlight">memasak</span> sesuatu yang manis di dapur! 🍰</p>
        
        <hr style="border: 0; border-top: 1px solid #ffe5ec; margin: 20px 0;">

        <div class="form-section">
            <h3>💌 Tinggalkan Pesan Lucu</h3>
            <p style="font-size: 0.9rem; color: #777;">Kasih tahu aku kesan pesanmu atau sekadar sapa "Hai" di sini ya!</p>
            
            <form onsubmit="kirimPesan(event)">
                <input type="text" id="nama" placeholder="Nama kamu siapa? 🐰" required>
                <textarea id="pesan" rows="3" placeholder="Tulis pesan/kesan yang lucu di sini... 🐾" required></textarea>
                <button type="submit">Kirim ke Lala 💞</button>
            </form>
        </div>
    </div>

    <script>
        function kirimPesan(event) {
            event.preventDefault(); // Biar webnya gak reload otomatis
            
            // Mengambil data yang diketik temenmu
            var nama = document.getElementById('nama').value;
            var pesan = document.getElementById('pesan').value;
            
            // Munculin pop-up makasih
            alert("Yeay! Makasih " + nama + " udah kirim pesan: \"" + pesan + "\" \n\n(Nanti bagian ini bisa kita hubungin ke Email atau Google Form biar tersimpan beneran!)");
            
            // Mengosongkan form setelah diklik
            document.getElementById('nama').value = '';
            document.getElementById('pesan').value = '';
        }
    </script>

</body>
</html>
